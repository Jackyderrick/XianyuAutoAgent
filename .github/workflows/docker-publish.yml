name: Build and Publish Docker Image

# 触发条件：当推送到 main 或 master 分支时自动触发
on:
  push:
    branches: [ "main", "master" ]

env:
  REGISTRY: ghcr.io
  # IMAGE_NAME 会自动获取你的 "用户名/仓库名"
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # 允许向 GitHub Packages 写入镜像

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 登录到 GitHub 容器镜像库
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # 这里的 Token 是 GitHub 自动提供的，无需手动配置

      # 将用户名/仓库名转换为小写（Docker 镜像名必须小写）
      - name: Lowercase image name
        id: string
        uses: ASzc/change-string-case-action@v6
        with:
          string: ${{ env.IMAGE_NAME }}

      # 构建并推送镜像
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ steps.string.outputs.lowercase }}:latest
